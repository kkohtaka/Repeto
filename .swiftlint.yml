# SwiftLint Configuration for Repeto

# Disabled rules (customize based on project needs)
disabled_rules:
  - trailing_whitespace

# Opt-in rules (enable additional checks)
opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - sorted_first_last
  - modifier_order
  - closure_spacing
  - operator_usage_whitespace

# Included paths
included:
  - Repeto
  - RepetoTests
  - RepetoUITests

# Excluded paths
excluded:
  - Pods
  - .build
  - build
  - DerivedData
  - fastlane

# Rule configurations
line_length:
  warning: 120
  error: 150

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - i
    - j
    - x
    - y

type_name:
  min_length: 3
  max_length: 50

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 2
  statement_level:
    warning: 5

# Custom rules: enforce design tokens (see TOKENS.md).
# These make the "no hardcoded values" guardrail machine-checkable instead of
# documentation-only. DesignSystem.swift and the asset catalog are the single
# source of truth, so token definitions themselves are excluded.
custom_rules:
  no_hardcoded_frame_size:
    name: "Hardcoded frame size"
    regex: '\.frame\(\s*(width|height):\s*[0-9]'
    message: "Avoid hardcoded frame sizes. Use a DesignSystem token or an @ScaledMetric value (see TOKENS.md)."
    severity: warning
  no_raw_tint_color:
    name: "Raw tint color"
    regex: '\.tint\(\s*\.(blue|red|green|orange|yellow|pink|purple|gray|mint|teal|indigo|brown|cyan)\b'
    message: "Avoid raw system colors for .tint. Use a semantic token such as .accent / .destructive (see TOKENS.md)."
    severity: warning
    excluded: ".*DesignSystem\\.swift"
  no_raw_color_component:
    name: "Raw color from components"
    regex: 'Color\(\s*(red|hue|hex):'
    message: "Avoid building colors from raw components in views. Define the color as a token in DesignSystem.swift or the asset catalog (see TOKENS.md)."
    severity: warning
    excluded: ".*DesignSystem\\.swift"

# Custom reporter (optional)
reporter: "xcode"
